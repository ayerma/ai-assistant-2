name: Jira -> Answer Questions

on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: "Jira issue key (e.g., PROJ-123)"
        required: true
        type: string
      questions_json:
        description: "Questions JSON object: {topic, questions:[...]}"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  answer-questions:
    runs-on: ubuntu-latest

    env:
      TARGET_REPO: ${{ vars.TARGET_REPO }}
      TARGET_REF: ${{ vars.TARGET_REF || 'main' }}
      TARGET_REPO_PATH: ${{ vars.TARGET_REPO_PATH || 'target-repo' }}
      TARGET_REPO_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
      CLI_MODEL: ${{ vars.CLI_MODEL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build
        run: mvn -q -DskipTests package

      - name: Clone target repository
        run: |
          if [ -z "$TARGET_REPO" ]; then
            echo "[ERROR] TARGET_REPO is required (format: owner/repo)"
            exit 1
          fi

          if [ -n "$TARGET_REPO_TOKEN" ]; then
            CLONE_URL="https://x-access-token:${TARGET_REPO_TOKEN}@github.com/${TARGET_REPO}.git"
          else
            CLONE_URL="https://github.com/${TARGET_REPO}.git"
          fi

          echo "[INFO] Cloning $TARGET_REPO@$TARGET_REF into $TARGET_REPO_PATH"
          git clone --depth 1 --branch "$TARGET_REF" "$CLONE_URL" "$TARGET_REPO_PATH"

          # Configure git with token for all operations
          cd "$TARGET_REPO_PATH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$TARGET_REPO_TOKEN" ]; then
            # Update remote URL to use token for push operations
            git remote set-url origin "https://x-access-token:${TARGET_REPO_TOKEN}@github.com/${TARGET_REPO}.git"
            
            # Configure git to use the token globally for this runner
            git config --global credential.helper store
            echo "https://x-access-token:${TARGET_REPO_TOKEN}@github.com" > ~/.git-credentials
            
            # Also set url insteadOf for https GitHub URLs
            git config --global url."https://x-access-token:${TARGET_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi

      - name: Verify target repository write access
        run: |
          if [ -z "$TARGET_REPO_TOKEN" ]; then
            echo "[ERROR] TARGET_REPO_TOKEN is required for pushing branches and creating PRs in $TARGET_REPO"
            exit 1
          fi

          AUTH_PUSH_URL="https://x-access-token:${TARGET_REPO_TOKEN}@github.com/${TARGET_REPO}.git"
          echo "[INFO] Verifying authenticated access to $TARGET_REPO before generating answers"

          if ! git ls-remote "$AUTH_PUSH_URL" "refs/heads/$TARGET_REF" > /dev/null; then
            echo "[ERROR] TARGET_REPO_TOKEN cannot access $TARGET_REPO."
            echo "[ERROR] Check that the token is valid, has repository access, and includes contents write permission."
            exit 1
          fi

      - name: Install GitHub Copilot CLI
        run: |
          echo "Installing GitHub Copilot CLI..."
          npm install -g @github/copilot

          # Add npm bin to PATH
          NPM_PREFIX=$(npm prefix -g)
          echo "$NPM_PREFIX/bin" >> $GITHUB_PATH

          echo "Copilot CLI installed successfully"

      - name: Prepare questions JSON
        env:
          QUESTIONS_JSON_INPUT: ${{ inputs.questions_json }}
        run: |
          echo "[INFO] Writing questions JSON to file..."

          # Write exactly what the workflow received, then validate it.
          printf '%s' "$QUESTIONS_JSON_INPUT" > content-creator-questions.raw

          if jq -e . content-creator-questions.raw > /dev/null 2>&1; then
            jq . content-creator-questions.raw > content-creator-questions.json
          else
            echo "[ERROR] questions_json is not valid JSON."
            echo "[ERROR] Received payload preview:"
            head -c 300 content-creator-questions.raw || true
            echo
            echo '[ERROR] Expected format: {"topic":"...","questions":["..."]}'
            exit 5
          fi

          TOPIC=$(jq -r '.topic' content-creator-questions.json)
          QUESTION_COUNT=$(jq '.questions | length' content-creator-questions.json)
          echo "[INFO] Topic: $TOPIC"
          echo "[INFO] Question count: $QUESTION_COUNT"

      - name: Answer questions
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

          MODELS_TOKEN: ${{ secrets.MODELS_TOKEN }}
          MODELS_ENDPOINT: ${{ vars.MODELS_ENDPOINT }}
          MODELS_MODEL: ${{ vars.MODELS_MODEL || 'gpt-4o' }}

          GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

          USE_MODELS_API: ${{ vars.USE_MODELS_API || 'true' }}
          CONTENT_CREATOR_MODE: answers
          CONTENT_CREATOR_ANSWER_INSTRUCTIONS_PATH: instructions/platform/roles/content-creator-role.md
          TECHNICAL_REQUIREMENTS_PATH: instructions/platform/technical/java-specialist.md
          CONTENT_CREATOR_QUESTIONS_INPUT_PATH: content-creator-questions.json
          CONTENT_CREATOR_OUTPUT_PATH: content-creator-output.json
          POST_ANSWERS_TO_JIRA: "false"

          JIRA_ISSUE_KEY: ${{ inputs.ticket_id }}
        run: |
          echo "[INFO] Answering questions using Java specialist guidance..."
          java -cp target/ai-assistant-2-automation-0.1.0-all.jar com.ayerma.assistant.ContentCreatorRunner

      - name: Generate content files and create PR
        env:
          GITHUB_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
          GH_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          echo "[INFO] Enriching target repository with interview Q&A content..."

          # Read the generated Q&A content
          TOPIC=$(jq -r '.topic' content-creator-output.json)
          echo "[INFO] Topic: $TOPIC"

          # Create sanitized branch name with ticket ID prefix (matching dev flow)
          SANITIZED_TOPIC=$(echo "$TOPIC" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//')
          BRANCH_NAME="${{ inputs.ticket_id }}/content/${SANITIZED_TOPIC}"
          echo "[INFO] Branch name: $BRANCH_NAME"

          # Create branch before Copilot writes files
          cd "$TARGET_REPO_PATH"
          git checkout -b "$BRANCH_NAME"

          # Keep all files Copilot needs inside the target repository to avoid cross-repo access issues
          cp ../content-creator-output.json ./content-creator-output.json

          # Prompt Copilot to write content files only (no git/PR operations)
          PROMPT="You are a technical content organizer.

          I have generated Java interview questions with answers for the topic: '$TOPIC'.
          The Q&A content is in the file content-creator-output.json with structure:
          {
            \"topic\": \"...\",
            \"questions\": [{\"question\": \"...\", \"answer\": \"...\"}]
          }

          CRITICAL REQUIREMENT - READ FIRST:
          Before creating any files, you MUST read and follow the instructions in the file:
          public/data/ADDING_CONTENT.md

          This file contains the REQUIRED format and structure for adding content to this repository.
          You MUST follow those instructions exactly when creating the markdown files.

          Your task:
          1. Read public/data/ADDING_CONTENT.md
          2. Read content-creator-output.json with the Q&A content
          3. Create the required files in the CURRENT repository following the EXACT structure in ADDING_CONTENT.md
          4. Use the format, naming conventions, and organization specified in ADDING_CONTENT.md

          IMPORTANT:
          - Apply the file changes directly now. Do NOT only describe a plan.
          - Only write the content files. Do NOT create branches, run git commands, or create pull requests.
          - All file edits must be made inside the CURRENT repository.

          Remember: Follow the ADDING_CONTENT.md instructions exactly!"

          echo "[INFO] Calling Copilot CLI to write content files..."
          COPILOT_ARGS=(--allow-all-tools -p "$PROMPT")
          if [ -n "$CLI_MODEL" ]; then
            echo "[INFO] Using Copilot CLI model: $CLI_MODEL"
            COPILOT_ARGS=(--model "$CLI_MODEL" "${COPILOT_ARGS[@]}")
          else
            echo "[INFO] Using Copilot CLI default model"
          fi
          copilot "${COPILOT_ARGS[@]}" 2>&1 | tee ../copilot-output.txt
          echo "[INFO] Copilot CLI execution completed"

          # Commit and push via script
          git add .

          if git diff --cached --quiet; then
            echo "[ERROR] No changes detected - Copilot may not have written any files"
            exit 1
          fi

          git restore --staged content-creator-output.json || true
          rm -f content-creator-output.json

          git commit -m "Add interview questions: $TOPIC"

          AUTH_PUSH_URL="https://x-access-token:${TARGET_REPO_TOKEN}@github.com/${TARGET_REPO}.git"

          git push "$AUTH_PUSH_URL" "HEAD:refs/heads/$BRANCH_NAME"
          echo "[SUCCESS] Pushed branch $BRANCH_NAME"
          cd ..

          # Create PR via GitHub CLI
          echo "[INFO] Creating PR via GitHub CLI..."
          PR_BODY="Auto-generated interview questions and answers from Jira ticket ${{ inputs.ticket_id }}.\n\nTopic: $TOPIC\nGenerated by: Content-Creator workflow"
          PR_URL=$(gh pr create \
            --repo "$TARGET_REPO" \
            --head "$BRANCH_NAME" \
            --base "$TARGET_REF" \
            --title "Add Interview Q&A: $TOPIC" \
            --body "$PR_BODY")

          echo "[SUCCESS] Created PR: $PR_URL"

          # Write pr-info.json for subsequent steps
          jq -n --arg url "$PR_URL" '{"pull_request_url": $url, "summary": "Created PR for interview questions"}' > pr-info.json
          echo "[SUCCESS] Wrote pr-info.json"
          cat pr-info.json

      - name: Auto-merge PR
        if: ${{ vars.AUTOMERGE == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
          GH_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
          echo "[INFO] Automerge enabled - attempting to merge PR"

          PR_URL=$(python3 -c "import json; data=json.load(open('pr-info.json')); print(data.get('pull_request_url', ''))")

          if [ -z "$PR_URL" ] || [[ "$PR_URL" == ERROR* ]]; then
            echo "[WARN] No valid PR URL found - skipping automerge"
            exit 0
          fi

          echo "[INFO] PR URL: $PR_URL"

          # Extract PR number from URL
          PR_NUMBER=$(echo "$PR_URL" | grep -oP '/pull/\K[0-9]+' || echo "")
          if [ -z "$PR_NUMBER" ]; then
            echo "[ERROR] Could not extract PR number from URL: $PR_URL"
            exit 0
          fi

          echo "[INFO] PR Number: $PR_NUMBER"
          cd "$TARGET_REPO_PATH"

          # Use GitHub CLI to merge the PR
          gh pr merge "$PR_NUMBER" --merge --delete-branch || {
            echo "[WARN] Auto-merge failed - PR may require review or have conflicts"
            exit 0
          }

          echo "[SUCCESS] PR #$PR_NUMBER merged successfully"
          echo "MERGE_SUCCESS=true" >> $GITHUB_ENV

      - name: Update Jira with merge status
        if: ${{ vars.AUTOMERGE == 'true' && env.MERGE_SUCCESS == 'true' }}
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          TOPIC=$(jq -r '.topic' content-creator-output.json)
          PR_URL=$(python3 -c "import json; data=json.load(open('pr-info.json')); print(data.get('pull_request_url', ''))")

          COMMENT="✅ **Interview Q&A Content Merged**\n\nTopic: **$TOPIC**\n\nThe pull request has been automatically merged to the target repository.\n\n🔗 [View Merged PR]($PR_URL)\n\n[View Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          curl -X POST "$JIRA_BASE_URL/rest/api/3/issue/${{ inputs.ticket_id }}/comment" \
            -H "Content-Type: application/json" \
            -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            -d "$(jq -n --arg comment "$COMMENT" '{body: {type: "doc", version: 1, content: [{type: "paragraph", content: [{type: "text", text: $comment}]}]}}')" || {
            echo "[WARN] Failed to add merge comment to Jira"
          }

      - name: Transition Jira ticket to Done
        if: ${{ vars.AUTOMERGE == 'true' && env.MERGE_SUCCESS == 'true' }}
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_ISSUE_KEY: ${{ inputs.ticket_id }}
          JIRA_DONE_TRANSITION_ID: ${{ vars.JIRA_DONE_TRANSITION_ID || '31' }}
        run: |
          echo "[INFO] Transitioning Jira ticket $JIRA_ISSUE_KEY to Done"

          curl -X POST \
            -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"transition\": {\"id\": \"$JIRA_DONE_TRANSITION_ID\"}}" \
            "$JIRA_BASE_URL/rest/api/2/issue/$JIRA_ISSUE_KEY/transitions" || {
            echo "[WARN] Failed to transition ticket - check JIRA_DONE_TRANSITION_ID configuration"
            exit 0
          }

          echo "[SUCCESS] Jira ticket $JIRA_ISSUE_KEY transitioned to Done"

      - name: Update Jira with PR (no auto-merge)
        if: ${{ vars.AUTOMERGE != 'true' }}
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          TOPIC=$(jq -r '.topic' content-creator-output.json)
          PR_URL=$(python3 -c "import json; data=json.load(open('pr-info.json')); print(data.get('pull_request_url', ''))")
          QUESTION_COUNT=$(jq '.questions | length' content-creator-output.json)

          COMMENT="📝 **Interview Q&A Content Ready for Review**\n\nTopic: **$TOPIC**\nQuestions: **$QUESTION_COUNT**\n\nA pull request has been created with the generated content.\n\n🔗 [Review Pull Request]($PR_URL)\n\n[View Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          curl -X POST "$JIRA_BASE_URL/rest/api/3/issue/${{ inputs.ticket_id }}/comment" \
            -H "Content-Type: application/json" \
            -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            -d "$(jq -n --arg comment "$COMMENT" '{body: {type: "doc", version: 1, content: [{type: "paragraph", content: [{type: "text", text: $comment}]}]}}')" || {
            echo "[WARN] Failed to add PR comment to Jira"
          }

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: content-creator-output
          path: |
            content-creator-questions.json
            content-creator-output.json
            copilot-output.txt
            pr-info.json
